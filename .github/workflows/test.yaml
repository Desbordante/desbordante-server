name: Test
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.30"

      - name: Install deps
        run: uv sync && make init

      - name: Start containers
        run: docker compose -f dev-docker-compose.yaml up -d --build

      - name: Wait for Postgres
        run: |
          until docker compose -f dev-docker-compose.yaml exec -T postgres pg_isready -U admin -d desbordante; do
            sleep 2
          done

      - name: Run migrations
        run: make migrate

      - name: Run tests
        run: make test

      - name: Stop containers
        if: always()
        run: docker compose -f dev-docker-compose.yaml down
